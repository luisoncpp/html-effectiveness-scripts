<div class="board-layout board-layout--{{ variant }}">
    {% for column in columns %}
    <div class="board-column">
        <div class="board-column__header">
            <div class="board-column__title">{{ column.title|safe }}</div>
            <span class="board-column__count">{{ column.items|length }}</span>
        </div>
        <div class="board-column__body">
            {% for item in column.items %}
            <div class="board-item">{{ item|safe }}</div>
            {% endfor %}
        </div>
    </div>
    {% endfor %}
</div>
{% if children %}
<div class="board-layout__children">{{ children }}</div>
{% endif %}
