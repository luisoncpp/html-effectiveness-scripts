<div class="module-map">
  <h2>{{ title|safe }}</h2>
  <div class="canvas">
    <svg viewBox="{{ view_box }}">
      <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
          <path d="M0,0 L10,5 L0,10 z" fill="#87867F"/>
        </marker>
      </defs>

      <!-- edges -->
      {% for edge in edges %}
      <path class="edge" d="{{ edge.d }}" marker-end="url(#arrow)"/>
      {% if edge.label %}
      <text class="edge-label" x="0" y="0">{{ edge.label|safe }}</text>
      {% endif %}
      {% endfor %}

      <!-- nodes -->
      {% for node in nodes %}
      <g class="node{% if node.class %} {{ node.class }}{% endif %}">
        <rect x="{{ node.x }}" y="{{ node.y }}" width="{{ node.width }}" height="{{ node.height }}" rx="8"/>
        <text x="{{ node.x + node.width // 2 }}" y="{{ node.y + node.height // 2 + 4 }}" text-anchor="middle">{{ node.label|safe }}</text>
      </g>
      {% endfor %}
    </svg>
  </div>
</div>
{% if children %}
<div class="module-map__children">{{ children }}</div>
{% endif %}
