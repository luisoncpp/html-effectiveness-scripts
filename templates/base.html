<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title }}</title>
    {{ inline_styles }}
</head>
<body class="layout-{{ layout }}">
    {% if layout == "wide" or layout == "reading-column" %}
    <div class="page">
        <main>
            {{ content }}
        </main>
    </div>
    {% else %}
    <main>
        {{ content }}
    </main>
    {% endif %}
    {{ inline_scripts }}
</body>
</html>
